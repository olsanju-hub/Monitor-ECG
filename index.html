<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitor ECG</title>
  <meta name="description" content="Simulador educativo de ECG en una derivación." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="panel panel-monitor">
      <div class="monitor-header">
        <div class="monitor-labels">
          <p class="eyebrow">Simulación docente</p>
          <h1 id="currentRhythmLabel">Ritmo sinusal</h1>
        </div>
      </div>

      <div class="monitor-device">
        <div class="monitor-frame">
          <canvas id="ecgCanvas" width="1400" height="520" aria-label="Monitor de ECG"></canvas>
        </div>
      </div>
    </section>

    <aside class="panel panel-controls">
      <div class="controls-block">
        <label for="rhythmSelect">Ritmo / patrón ECG</label>
        <select id="rhythmSelect"></select>
      </div>

      <div class="controls-block grow-block">
        <label for="infoText">Descripción</label>
        <article id="infoText" class="info-box"></article>
      </div>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
